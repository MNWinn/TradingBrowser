services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
      POSTGRES_DB: tradingbrowser
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: dev
      MODE: research
      DATABASE_URL: postgresql+psycopg://trading:trading@postgres:5432/tradingbrowser
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ALPACA_PAPER_BASE_URL: https://paper-api.alpaca.markets
      ALPACA_LIVE_BASE_URL: https://api.alpaca.markets
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_API_SECRET: ${ALPACA_API_SECRET:-}
      ALPACA_DATA_BASE_URL: ${ALPACA_DATA_BASE_URL:-https://data.alpaca.markets}
      ALPACA_DATA_FEED: ${ALPACA_DATA_FEED:-iex}
      ALPACA_DATA_WS_IEX: ${ALPACA_DATA_WS_IEX:-wss://stream.data.alpaca.markets/v2/iex}
      ALPACA_DATA_WS_SIP: ${ALPACA_DATA_WS_SIP:-wss://stream.data.alpaca.markets/v2/sip}
      LIVE_TRADING_ENABLED: "false"
      MIROFISH_BASE_URL: ${MIROFISH_BASE_URL:-}
      MIROFISH_API_KEY: ${MIROFISH_API_KEY:-}
      MIROFISH_TIMEOUT_SEC: ${MIROFISH_TIMEOUT_SEC:-6.0}
      MIROFISH_SIMULATION_ID: ${MIROFISH_SIMULATION_ID:-}
      MIROFISH_FOCUS_TICKERS: ${MIROFISH_FOCUS_TICKERS:-}
      AUTO_CREATE_SCHEMA: "true"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./backend
    command: celery -A app.workers.celery_app.celery_app worker -l INFO
    environment:
      APP_ENV: dev
      MODE: research
      DATABASE_URL: postgresql+psycopg://trading:trading@postgres:5432/tradingbrowser
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis
      - postgres

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws/market
      NEXT_PUBLIC_ADMIN_API_TOKEN: ${NEXT_PUBLIC_ADMIN_API_TOKEN:-admin-dev-token}
      NEXT_PUBLIC_TRADER_API_TOKEN: ${NEXT_PUBLIC_TRADER_API_TOKEN:-trader-dev-token}
      NEXT_PUBLIC_ANALYST_API_TOKEN: ${NEXT_PUBLIC_ANALYST_API_TOKEN:-analyst-dev-token}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
